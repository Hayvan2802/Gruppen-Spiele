<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Imposter – Gruppen Spiele</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c1a 0%, #1a0f2e 50%, #0c1a2e 100%);
    color: #f0eaf8;
    font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
  }
  .header { text-align: center; padding: 36px 0 20px; }
  .logo {
    font-size: 40px; font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(90deg, #c084fc, #818cf8, #38bdf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 4px;
  }
  .tagline { color: #a78bfa; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; font-weight: 500; }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(168,139,250,0.2);
    border-radius: 20px; padding: 28px 22px;
    width: 100%; max-width: 420px;
    backdrop-filter: blur(12px);
  }
  h2 { font-size: 19px; font-weight: 700; margin-bottom: 18px; color: #e2d9f3; }
  input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(168,139,250,0.3);
    border-radius: 12px; padding: 14px 16px;
    color: #f0eaf8; font-size: 16px; outline: none;
    margin-bottom: 10px;
  }
  input::placeholder { color: #5a4f72; }
  .btn {
    width: 100%; padding: 15px; border-radius: 14px; border: none;
    cursor: pointer; font-size: 16px; font-weight: 700;
    letter-spacing: 0.3px; transition: opacity 0.15s;
    color: #fff; margin-top: 8px; display: block;
  }
  .btn-primary { background: linear-gradient(135deg, #7c3aed, #4f46e5); }
  .btn-ghost { background: rgba(255,255,255,0.08); }
  .btn-danger { background: linear-gradient(135deg, #dc2626, #b91c1c); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .spieler-tag {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 8px;
  }
  .del-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 20px; line-height: 1; }
  .divider { height: 1px; background: rgba(168,139,250,0.15); margin: 16px 0; }
  .imposter-count { display: flex; gap: 8px; margin-top: 8px; }
  .count-btn {
    flex: 1; padding: 10px; border-radius: 10px; border: none;
    cursor: pointer; font-weight: 700; font-size: 15px; color: #fff;
    background: rgba(255,255,255,0.08); transition: background 0.15s;
  }
  .count-btn.active { background: linear-gradient(135deg, #7c3aed, #4f46e5); }
  .hint { font-size: 12px; color: #7c6f9f; margin-top: 6px; }
  .big-emoji { font-size: 60px; text-align: center; margin: 14px 0; }
  .karte {
    border-radius: 16px; padding: 22px; margin-bottom: 18px; text-align: center;
  }
  .karte-normal {
    background: rgba(16,163,74,0.12);
    border: 1px solid rgba(16,163,74,0.35);
  }
  .karte-imposter {
    background: rgba(220,38,38,0.12);
    border: 1px solid rgba(220,38,38,0.35);
  }
  .wort { font-size: 34px; font-weight: 900; color: #fff; letter-spacing: -0.5px; margin: 8px 0; }
  .pill {
    display: inline-block; border-radius: 999px;
    padding: 4px 14px; font-size: 13px; font-weight: 600;
  }
  .pill-red { background: rgba(220,38,38,0.75); }
  .pill-green { background: rgba(16,163,74,0.75); }
  .pill-purple { background: rgba(124,58,237,0.6); }
  .sub { font-size: 13px; color: #7c6f9f; margin-top: 8px; }
  .stimm-btn {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #f0eaf8; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-bottom: 8px; text-align: left;
    transition: background 0.1s;
  }
  .stimm-btn:hover { background: rgba(124,58,237,0.2); }
  .result-box {
    background: rgba(255,255,255,0.04);
    border-radius: 14px; padding: 16px; margin-bottom: 18px; text-align: left;
  }
  .result-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; font-size: 14px;
  }
  .progress-bar {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px; margin-bottom: 18px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7c3aed, #38bdf8);
    border-radius: 999px; transition: width 0.3s;
  }
  .center { text-align: center; }
  .name-big { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .label-small { font-size: 12px; color: #a78bfa; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">IMPOSTER</div>
  <div class="tagline">Gruppen Spiele · Werbefrei</div>
</div>

<div id="app"></div>

<script>
const WOERTER = [
  "Hund","Katze","Elefant","Pinguin","Delfin","Tiger","Affe","Känguru","Papagei","Hai",
  "Pizza","Sushi","Burger","Pasta","Tacos","Ramen","Schnitzel","Döner","Spaghetti","Currywurst",
  "Fußball","Tennis","Basketball","Schwimmen","Boxen","Ski fahren","Surfen","Klettern","Radfahren","Golf",
  "Strand","Dschungel","Wüste","Iglu","Raumschiff","Kasino","Krankenhaus","Burg","Unterwasserwelt","Vulkan",
  "Pilot","Arzt","Zauberer","Detektiv","Koch","Astronaut","Clown","Rockstar","Ninja","Vampir",
  "Gitarre","Klavier","Trompete","Schlagzeug","Geige",
  "Drache","Einhorn","Zombie","Pirat","Roboter"
];

function rndWort() { return WOERTER[Math.floor(Math.random() * WOERTER.length)]; }
function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}

let state = {
  phase: 'setup',
  namen: [],
  eingabe: '',
  imposterAnzahl: 1,
  rollen: [],
  aktIdx: 0,
  gezeigt: false,
  stimmen: {},
  stimmIdx: 0,
};

function render() {
  const app = document.getElementById('app');
  const s = state;

  if (s.phase === 'setup') {
    app.innerHTML = `
      <div class="card">
        <h2>👥 Spieler hinzufügen</h2>
        <div id="spieler-liste">
          ${s.namen.map((n,i) => `
            <div class="spieler-tag">
              <span style="font-weight:600">${n}</span>
              <button class="del-btn" onclick="entfernen(${i})">×</button>
            </div>
          `).join('')}
        </div>
        <input id="name-input" type="text" placeholder="Name eingeben..." value="${s.eingabe}"
          oninput="state.eingabe=this.value"
          onkeydown="if(event.key==='Enter')hinzufuegen()">
        <button class="btn btn-ghost" onclick="hinzufuegen()">+ Spieler hinzufügen</button>
        <div class="divider"></div>
        <div>
          <div style="font-size:14px;color:#a78bfa;font-weight:600;margin-bottom:8px">🕵️ Anzahl Imposter: ${s.imposterAnzahl}</div>
          <div class="imposter-count">
            <button class="count-btn ${s.imposterAnzahl===1?'active':''}" onclick="setImposter(1)">1</button>
            <button class="count-btn ${s.imposterAnzahl===2?'active':''}" onclick="setImposter(2)">2</button>
          </div>
        </div>
        <button class="btn btn-primary" style="margin-top:20px" onclick="starten()" ${s.namen.length<3?'disabled':''}>
          🎮 Spiel starten
        </button>
        ${s.namen.length<3?'<div class="hint">Mindestens 3 Spieler benötigt</div>':''}
      </div>
    `;
    document.getElementById('name-input').focus();
  }

  else if (s.phase === 'pass') {
    const sp = s.rollen[s.aktIdx];
    const total = s.rollen.length;
    const pct = ((s.aktIdx) / total * 100).toFixed(0);
    app.innerHTML = `
      <div class="card center">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:13px;color:#a78bfa;margin-bottom:8px;font-weight:600">${s.aktIdx+1} von ${total}</div>
        <div class="big-emoji">📱</div>
        <div class="name-big">${sp.name}</div>
        <div class="sub" style="margin-bottom:22px">Gib das Handy an <strong style="color:#c4b5fd">${sp.name}</strong> weiter.<br>Alle anderen wegschauen! 👀</div>
        ${!s.gezeigt ? `
          <button class="btn btn-primary" onclick="zeigen()">👁 Karte aufdecken</button>
        ` : `
          <div class="karte ${sp.istImposter?'karte-imposter':'karte-normal'}">
            ${sp.istImposter ? `
              <div style="font-size:44px;margin-bottom:8px">🕵️</div>
              <span class="pill pill-red">DU BIST DER IMPOSTER!</span>
              <div class="sub" style="margin-top:10px;color:#fca5a5">Du kennst das Wort nicht.<br>Tu so als ob – lass dich nicht erwischen!</div>
            ` : `
              <div class="label-small">Dein Wort</div>
              <div class="wort">${sp.wort}</div>
              <div class="sub" style="color:#6ee7b7">Beschreibe es ohne das Wort zu sagen!</div>
            `}
          </div>
          <button class="btn btn-ghost" onclick="verstecken()" style="margin-bottom:4px">🙈 Karte verstecken</button>
          <button class="btn btn-primary" onclick="weiter()">
            ${s.aktIdx+1>=total ? '🗳 Abstimmung starten' : '➡ Weiter'}
          </button>
        `}
      </div>
    `;
  }

  else if (s.phase === 'voting') {
    const abstimmender = s.rollen[s.stimmIdx];
    const pct = (s.stimmIdx / s.rollen.length * 100).toFixed(0);
    app.innerHTML = `
      <div class="card">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="center" style="margin-bottom:20px">
          <div style="font-size:34px;margin-bottom:8px">🗳</div>
          <h2 style="margin-bottom:4px">Wer ist der Imposter?</h2>
          <div style="color:#a78bfa;font-weight:700;font-size:16px">${abstimmender.name} stimmt ab</div>
          <div class="hint" style="margin-top:2px">${s.stimmIdx+1} von ${s.rollen.length}</div>
        </div>
        ${s.rollen.filter(r=>r.name!==abstimmender.name).map(r=>`
          <button class="stimm-btn" onclick="abstimmen('${r.name}')">👤 ${r.name}</button>
        `).join('')}
      </div>
    `;
  }

  else if (s.phase === 'result') {
    const zaehlung = {};
    s.rollen.forEach(r => { zaehlung[r.name] = 0; });
    Object.values(s.stimmen).forEach(z => { zaehlung[z] = (zaehlung[z]||0)+1; });
    const max = Math.max(...Object.values(zaehlung));
    const rausgeworfen = Object.keys(zaehlung).filter(n=>zaehlung[n]===max);
    const imposterNamen = s.rollen.filter(r=>r.istImposter).map(r=>r.name);
    const erwischt = rausgeworfen.some(n=>imposterNamen.includes(n));

    app.innerHTML = `
      <div class="card center">
        <div style="font-size:54px;margin-bottom:10px">${erwischt?'🎉':'🕵️'}</div>
        <div style="font-size:22px;font-weight:900;margin-bottom:4px">
          ${erwischt?'Imposter erwischt!':'Imposter gewinnt!'}
        </div>
        <div style="color:#a78bfa;font-size:14px;margin-bottom:20px">
          ${erwischt?'Die Gruppe hat gewonnen 🥳':'Der Imposter hat alle getäuscht 😈'}
        </div>
        <div class="result-box" style="text-align:left">
          <div class="label-small" style="margin-bottom:10px">Auflösung</div>
          <div style="margin-bottom:8px">
            <span style="color:#7c6f9f;font-size:13px">Das Wort war: </span>
            <strong style="color:#fff;font-size:18px">${s.rollen[0]?.wort}</strong>
          </div>
          <div style="margin-bottom:12px">
            <span style="color:#7c6f9f;font-size:13px">Imposter: </span>
            ${imposterNamen.map(n=>`<span class="pill pill-red" style="margin-left:4px">${n}</span>`).join('')}
          </div>
          <div class="divider"></div>
          <div class="label-small" style="margin-bottom:8px">Stimmen</div>
          ${s.rollen.map(r=>`
            <div class="result-row">
              <span>${r.name}${r.istImposter?' 🕵️':''}</span>
              <div style="display:flex;align-items:center;gap:6px">
                <span style="color:#a78bfa;font-weight:700">${zaehlung[r.name]||0}×</span>
                ${rausgeworfen.includes(r.name)?`<span class="pill pill-purple">Raus</span>`:''}
              </div>
            </div>
          `).join('')}
        </div>
        <button class="btn btn-primary" onclick="neustart()">🔄 Neues Spiel</button>
      </div>
    `;
  }
}

function hinzufuegen() {
  const val = state.eingabe.trim();
  if (val && !state.namen.includes(val)) {
    state.namen.push(val);
    state.eingabe = '';
    render();
    setTimeout(()=>{ const el=document.getElementById('name-input'); if(el)el.focus(); },10);
  }
}
function entfernen(i) { state.namen.splice(i,1); render(); }
function setImposter(n) { state.imposterAnzahl=n; render(); }

function starten() {
  if (state.namen.length < 3) return;
  const wort = rndWort();
  const gemischt = shuffle(state.namen);
  const impIdx = new Set(shuffle([...Array(gemischt.length).keys()]).slice(0, state.imposterAnzahl));
  state.rollen = gemischt.map((name,i) => ({ name, istImposter: impIdx.has(i), wort }));
  state.aktIdx = 0;
  state.gezeigt = false;
  state.stimmen = {};
  state.stimmIdx = 0;
  state.phase = 'pass';
  render();
}

function zeigen() { state.gezeigt = true; render(); }
function verstecken() { state.gezeigt = false; render(); }
function weiter() {
  if (state.aktIdx + 1 >= state.rollen.length) {
    state.phase = 'voting';
    state.stimmIdx = 0;
  } else {
    state.aktIdx++;
    state.gezeigt = false;
  }
  render();
}

function abstimmen(ziel) {
  const abstimmender = state.rollen[state.stimmIdx].name;
  state.stimmen[abstimmender] = ziel;
  if (state.stimmIdx + 1 >= state.rollen.length) {
    state.phase = 'result';
  } else {
    state.stimmIdx++;
  }
  render();
}

function neustart() {
  state.phase = 'setup';
  state.rollen = [];
  state.aktIdx = 0;
  state.gezeigt = false;
  state.stimmen = {};
  state.stimmIdx = 0;
  render();
}

render();
</script>
</body>
</html>
